name: verify-recommendations

on:
  workflow_dispatch:
    inputs:
      run_watchlist_first:
        description: "Run daily_theme_watchlist.py to refresh daily_rank.csv first"
        required: false
        default: "true"
      force_watchlist_run:
        description: "Force rerun daily_theme_watchlist.py when refreshing daily_rank.csv first"
        required: false
        type: boolean
        default: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m unittest discover -s tests

      - name: Refresh daily watchlist artifacts (best effort)
        if: ${{ inputs.run_watchlist_first == 'true' }}
        env:
          TELEGRAM_TOKEN: ""
          TELEGRAM_CHAT_IDS: ""
          LOG_LEVEL: INFO
          CONFIG_PATH: config.json
          WATCHLIST_CSV: watchlist.csv
          REALTIME_QUOTES: "0"
        run: |
          if [ "${{ inputs.force_watchlist_run }}" = "true" ]; then
            python daily_theme_watchlist.py --force || true
          else
            python daily_theme_watchlist.py || true
          fi

      - name: Verify recommendations from daily_rank.csv
        env:
          REALTIME_QUOTES: "0"
        run: |
          python verification/verify_recommendations.py \
            --rank-csv theme_watchlist_daily/daily_rank.csv \
            --out verification/watchlist_daily/verification_report.md \
            --snapshot-csv verification/watchlist_daily/reco_snapshots.csv

      - name: Upload verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: |
            theme_watchlist_daily/daily_rank.csv
            verification/watchlist_daily/verification_report.md
            verification/watchlist_daily/reco_snapshots.csv
