name: verify-recommendations

on:
  workflow_dispatch:
    inputs:
      run_watchlist_first:
        description: "Run stock_watch daily preopen to refresh daily_rank.csv first"
        required: false
        default: "true"
      force_watchlist_run:
        description: "Force rerun watchlist when refreshing daily_rank.csv first"
        required: false
        type: boolean
        default: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m unittest discover -s tests

      - name: Refresh daily watchlist artifacts (best effort)
        if: ${{ inputs.run_watchlist_first == 'true' }}
        env:
          TELEGRAM_TOKEN: ""
          TELEGRAM_CHAT_IDS: ""
          LOG_LEVEL: INFO
          CONFIG_PATH: config.json
          WATCHLIST_CSV: watchlist.csv
          REALTIME_QUOTES: "0"
        run: |
          if [ "${{ inputs.force_watchlist_run }}" = "true" ]; then
            python -m stock_watch daily --mode preopen --force-watchlist || true
          else
            python -m stock_watch daily --mode preopen || true
          fi

      - name: Verify recommendations from daily_rank.csv
        env:
          REALTIME_QUOTES: "0"
        run: |
          python -m stock_watch verification snapshot \
            --rank-csv runs/theme_watchlist_daily/daily_rank.csv \
            --out runs/verification/watchlist_daily/verification_report.md \
            --snapshot-csv runs/verification/watchlist_daily/reco_snapshots.csv

      - name: Upload verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: |
            runs/theme_watchlist_daily/daily_rank.csv
            runs/verification/watchlist_daily/verification_report.md
            runs/verification/watchlist_daily/reco_snapshots.csv
