name: stock-watch

on:
  schedule:
    - cron: "10 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-watchlist:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests yfinance

      - name: Run 20D v2.1 watchlist
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          LOG_LEVEL: INFO
          CONFIG_PATH: config_20d_v21.json
          WATCHLIST_CSV: watchlist_20d_v21.csv
        run: |
          python daily_theme_watchlist_20d_v21.py

      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config_20d_v21.json watchlist_20d_v21.csv theme_watchlist_daily/
          git diff --cached --quiet || git commit -m "Update 20D v2.1 stock watch artifacts [skip ci]"
          git push
