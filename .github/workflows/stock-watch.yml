name: stock-watch

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: "Force rerun even if the same code/config already completed successfully today"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  run-watchlist:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Print runtime clocks
        run: |
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Taipei now: $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M:%S %Z')"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m unittest discover -s tests

      - name: Run stock watch workflow
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          LOG_LEVEL: INFO
          CONFIG_PATH: config.json
          WATCHLIST_CSV: watchlist.csv
        run: |
          if [ "${{ inputs.force_run }}" = "true" ]; then
            python -m stock_watch daily --mode preopen --force-watchlist
          else
            python -m stock_watch daily --mode preopen
          fi

      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config.json watchlist.csv runs/theme_watchlist_daily/
          git diff --cached --quiet || git commit -m "Update stock watch artifacts [skip ci]"
          git push
