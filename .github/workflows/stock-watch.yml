name: stock-watch

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: "Deprecated: manual stock-watch runs always force the watchlist so notifications are complete."
        required: false
        type: boolean
        default: true
      telegram_chat_ids:
        description: "Optional override recipients for this run only, comma/newline separated. Empty uses TELEGRAM_CHAT_IDS secret."
        required: false
        type: string
        default: ""
      telegram_simple_chat_ids:
        description: "Optional override simple-version recipients for this run only. Empty uses TELEGRAM_SIMPLE_CHAT_IDS secret."
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  run-watchlist:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Print runtime clocks
        run: |
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Taipei now: $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M:%S %Z')"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: |
          ruff check .

      - name: Type check (mypy, non-blocking)
        continue-on-error: true
        run: |
          mypy stock_watch || true

      - name: Run tests
        run: |
          python scripts/run_unittest_quiet.py

      - name: Run stock watch workflow
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          TELEGRAM_SIMPLE_CHAT_IDS: ${{ inputs.telegram_simple_chat_ids || secrets.TELEGRAM_SIMPLE_CHAT_IDS }}
          STOCK_WATCH_LOCAL_TELEGRAM_CHAT_IDS: ${{ inputs.telegram_chat_ids || secrets.TELEGRAM_CHAT_IDS }}
          LOG_LEVEL: INFO
          CONFIG_PATH: config.json
          WATCHLIST_CSV: watchlist.csv
        run: |
          python -m stock_watch daily --mode preopen --force-watchlist

      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config.json watchlist.csv runs/theme_watchlist_daily/
          if git diff --cached --quiet; then
            echo "No artifact changes to commit."
            exit 0
          fi
          git commit -m "Update stock watch artifacts [skip ci]"
          git push || {
            git fetch origin main
            git rebase -X theirs origin/main
            git push
          }
