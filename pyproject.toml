[tool.ruff]
# Keep the gate focused and low-noise: target real bugs and obvious smells
# rather than enforcing an opinionated full style overhaul on a large codebase.
line-length = 120
target-version = "py311"
extend-exclude = ["runs", ".pytest_cache"]

[tool.ruff.lint]
# Keep the gate focused and low-noise: target real bugs (syntax errors,
# undefined names, unused imports/variables) rather than enforcing an
# opinionated full style overhaul on a large existing codebase. Additional
# rule families (B, UP, I) can be enabled incrementally later.
# E9: syntax errors, F: pyflakes.
select = ["E9", "F"]
ignore = [
    "E501",  # line length handled loosely; not worth churn on legacy files
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["F811", "F401"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = false
# Gradual typing: only flag the most clearly broken cases for now so the gate
# is actionable rather than overwhelming on an existing untyped codebase.
check_untyped_defs = false
disallow_untyped_defs = false
follow_imports = "silent"
exclude = ["runs/", "tests/", "docs/"]
